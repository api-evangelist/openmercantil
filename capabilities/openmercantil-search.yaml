naftiko: 1.0.0-alpha2
info:
  label: OpenMercantil Public API — Search
  description: 'OpenMercantil Public API — Search. 2 operations. Lead operation: Search Persons. Self-contained Naftiko capability
    covering one Openmercantil business surface.'
  tags:
  - Openmercantil
  - Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENMERCANTIL_API_KEY: OPENMERCANTIL_API_KEY
capability:
  consumes:
  - type: http
    namespace: openmercantil-search
    baseUri: https://openmercantil.es
    description: OpenMercantil Public API — Search business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-person-search
      path: /api/v1/person/search
      operations:
      - name: searchpersons
        method: GET
        description: Search Persons
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
    - name: api-v1-search
      path: /api/v1/search
      operations:
      - name: searchcompanies
        method: GET
        description: Search Spanish Companies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
          description: Search query, minimum 2 characters.
          required: true
        - name: limit
          in: query
          type: integer
          description: Maximum number of results.
        - name: offset
          in: query
          type: integer
          description: Pagination offset.
    authentication:
      type: apikey
      key: session
      value: '{{env.OPENMERCANTIL_API_KEY}}'
      placement: cookie
  exposes:
  - type: rest
    namespace: openmercantil-search-rest
    port: 8080
    description: REST adapter for OpenMercantil Public API — Search. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v1/person/search
      name: api-v1-person-search
      description: REST surface for api-v1-person-search.
      operations:
      - method: GET
        name: searchpersons
        description: Search Persons
        call: openmercantil-search.searchpersons
        with:
          q: rest.q
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/search
      name: api-v1-search
      description: REST surface for api-v1-search.
      operations:
      - method: GET
        name: searchcompanies
        description: Search Spanish Companies
        call: openmercantil-search.searchcompanies
        with:
          q: rest.q
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openmercantil-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenMercantil Public API — Search. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: search-persons
      description: Search Persons
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openmercantil-search.searchpersons
      with:
        q: tools.q
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: search-spanish-companies
      description: Search Spanish Companies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openmercantil-search.searchcompanies
      with:
        q: tools.q
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
